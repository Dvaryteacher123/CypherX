<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kijiwe Chat Live - Tagging Enabled</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #202c33; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #333; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #202c33; padding: 10px; border-radius: 10px; max-width: 85%; align-self: flex-start; word-wrap: break-word; }
        .tag { color: #00a884; font-weight: bold; cursor: pointer; }
        .sender { font-size: 11px; color: #8696a0; display: block; margin-bottom: 4px; }
        footer { background: #202c33; padding: 10px; display: flex; gap: 8px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
        button { background: #00a884; color: white; border: none; padding: 10px 18px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>Kijiwe Chat (@Tag Support)</header>

<div id="chat-window"></div>

<footer>
    <input type="text" id="username" placeholder="Jina lako..." style="width: 25%;">
    <input type="text" id="message" placeholder="Andika ujumbe (tumia @tag)...">
    <button onclick="sendMessage()">➤</button>
</footer>

<script>
    const topic = 'elia_chat_100'; // Badilisha jina hili liwe la siri
    const chatWindow = document.getElementById('chat-window');

    // 1. Kazi ya Kutuma Ujumbe
    async function sendMessage() {
        const user = document.getElementById('username').value || "Anonymous";
        const msgInput = document.getElementById('message');
        const msg = msgInput.value;

        if (!msg) return;

        // Tuma ujumbe kwenda ntfy
        await fetch(`https://ntfy.sh/${topic}`, {
            method: 'POST',
            body: JSON.stringify({ user: user, text: msg }),
            headers: { 'Click': 'https://ntfy.sh/' + topic }
        });

        msgInput.value = "";
    }

    // 2. Kazi ya Kupokea Ujumbe Live (EventSource)
    const eventSource = new EventSource(`https://ntfy.sh/${topic}/sse`);
    eventSource.onmessage = (e) => {
        try {
            const data = JSON.parse(e.data);
            const content = JSON.parse(data.message); // Tunachukua JSON tuliyotuma
            displayMessage(content.user, content.text);
        } catch (err) {
            // Kama ujumbe si JSON (mfano meseji ya kawaida)
            displayMessage("System", e.data);
        }
    };

    function displayMessage(user, text) {
        const div = document.createElement('div');
        div.className = 'msg-bubble';
        
        // Mfumo wa ku-highlight @tag
        const formattedText = text.replace(/(@\w+)/g, '<span class="tag">$1</span>');
        
        div.innerHTML = `<span class="sender">${user}</span>${formattedText}`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Gusa tag kuweka jina kwenye input
    document.addEventListener('click', function (e) {
        if (e.target.classList.contains('tag')) {
            document.getElementById('message').value += e.target.innerText + " ";
            document.getElementById('message').focus();
        }
    });
</script>

</body>
</html>
