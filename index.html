<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V100 PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #000; --danger: #ff003c; --win: #25d366; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 900; color: var(--p); text-shadow: 0 0 10px var(--p); }

        .lang-btn { background: none; border: 1px solid var(--p); color: var(--p); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 4px; }
        .lang-btn.active { background: var(--p); color: #000; }

        .container { max-width: 500px; margin: auto; padding: 15px; text-align: center; }

        /* Dashboard */
        .dash-circle { width: 160px; height: 160px; border: 5px solid #111; border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-top-color: var(--p); transition: 0.5s; }
        .charging-glow { box-shadow: 0 0 30px var(--win); border-color: var(--win) !important; }
        .heat-glow { box-shadow: 0 0 30px var(--danger); border-color: var(--danger) !important; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Terminal Logs */
        .terminal { background: rgba(0,255,204,0.02); border: 1px solid #222; border-radius: 8px; height: 160px; margin: 15px 0; padding: 10px; overflow: hidden; text-align: left; }
        .line { font-size: 9px; color: var(--p); margin: 2px 0; font-family: 'Courier New', monospace; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: #0a0d14; border: 1px solid #1a1a1a; padding: 10px; border-radius: 8px; text-align: left; }
        .v { font-size: 11px; font-weight: bold; color: var(--p); }

        .alert-box { display: none; background: var(--danger); color: #fff; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">DVARY_SNIPER_V100</div>
        <div>
            <button id="btn-sw" class="lang-btn active" onclick="setLang('sw')">SW</button>
            <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="container">
        <div id="heat-alert" class="alert-box">⚠️ WARNING: SYSTEM OVERHEAT! ⚠️</div>

        <div class="dash-circle" id="mainDash">
            <span id="batPer" style="font-size: 45px; font-weight: bold;">0%</span>
            <span id="batTemp" style="color: #ffcc00; font-size: 12px;">32.0°C</span>
        </div>

        <div class="terminal" id="term"></div>

        <div class="grid">
            <div class="card"><span id="t-status" style="font-size: 8px; color: #555;">HALI:</span><br><span id="val-status" class="v">...</span></div>
            <div class="card"><span id="t-volt" style="font-size: 8px; color: #555;">VOLTAGE:</span><br><span class="v">3.85V STABLE</span></div>
            <div class="card"><span id="t-source" style="font-size: 8px; color: #555;">CHANZO:</span><br><span id="val-source" class="v">BATTERY</span></div>
            <div class="card"><span id="t-health" style="font-size: 8px; color: #555;">AFYA:</span><br><span class="v" style="color:var(--win)">EXCELLENT</span></div>
        </div>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" style="background:#25d366; color:#fff; padding:15px; border-radius:8px; display:flex; align-items:center; justify-content:center; text-decoration:none; margin-top:15px; font-weight:bold; font-size:13px;">
            <i class="fab fa-whatsapp" style="margin-right:10px;"></i> <span id="t-join">JIUNGE NA CHANNEL YETU</span>
        </a>
    </div>

    <audio id="alarm"><source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3"></audio>

    <script>
        let currentLang = 'sw';
        const term = document.getElementById('term');
        const alarm = document.getElementById('alarm');

        const dictionary = {
            sw: { status: "HALI:", volt: "VOLTAGE:", source: "CHANZO:", health: "AFYA:", join: "JIUNGE NA CHANNEL YETU", connect: "IMEUNGANISHWA", disconnect: "HAICHAJI", battery: "BETRI", ac: "CHAJI (AC)", heatMsg: "⚠️ ONYO: SIMU INA MOTO! ⚠️", logs: ["KUHAKIKI MFUMO...", "USALAMA WA DATA...", "PROTOCALI ZA DVARY...", "UCHAMBUZI WA KERNEL...", "KUREKEBISHA BETRI..."] },
            en: { status: "STATUS:", volt: "VOLTAGE:", source: "SOURCE:", health: "HEALTH:", join: "JOIN OUR CHANNEL", connect: "CONNECTED", disconnect: "DISCONNECTED", battery: "BATTERY", ac: "CHARGING (AC)", heatMsg: "⚠️ WARNING: OVERHEAT! ⚠️", logs: ["SCANNING SYSTEM...", "DATA SECURITY...", "DVARY PROTOCOLS...", "KERNEL ANALYSIS...", "BATTERY CALIBRATION..."] }
        };

        function setLang(l) {
            currentLang = l;
            document.getElementById('btn-sw').classList.toggle('active', l==='sw');
            document.getElementById('btn-en').classList.toggle('active', l==='en');
            document.getElementById('t-status').innerText = dictionary[l].status;
            document.getElementById('t-volt').innerText = dictionary[l].volt;
            document.getElementById('t-source').innerText = dictionary[l].source;
            document.getElementById('t-health').innerText = dictionary[l].health;
            document.getElementById('t-join').innerText = dictionary[l].join;
            document.getElementById('heat-alert').innerText = dictionary[l].heatMsg;
        }

        function runTerminal() {
            setInterval(() => {
                const line = document.createElement('div');
                line.className = 'line';
                const baseLogs = dictionary[currentLang].logs;
                const log = baseLogs[Math.floor(Math.random()*baseLogs.length)];
                line.innerText = `> [${new Date().toLocaleTimeString()}] ${log} [0x${Math.random().toString(16).substr(2,4).toUpperCase()}] ... OK`;
                term.appendChild(line);
                if(term.childNodes.length > 10) term.removeChild(term.firstChild);
            }, 250);
        }

        function monitorBattery() {
            if('getBattery' in navigator) {
                navigator.getBattery().then(bat => {
                    const level = Math.round(bat.level * 100);
                    document.getElementById('batPer').innerText = level + "%";
                    
                    const isCharging = bat.charging;
                    const dash = document.getElementById('mainDash');
                    
                    // Connected/Disconnected Logic
                    document.getElementById('val-status').innerText = isCharging ? dictionary[currentLang].connect : dictionary[currentLang].disconnect;
                    document.getElementById('val-source').innerText = isCharging ? dictionary[currentLang].ac : dictionary[currentLang].battery;
                    
                    if(isCharging) dash.classList.add('charging-glow');
                    else dash.classList.remove('charging-glow');

                    // Overheat Logic (Simulated for Demo)
                    let temp = isCharging ? 41.2 : 32.5; // Ikiwekwa chaji inaongeza joto
                    document.getElementById('batTemp').innerText = temp + "°C";

                    if(temp >= 40) {
                        dash.classList.add('heat-glow');
                        document.getElementById('heat-alert').style.display = 'block';
                        alarm.play();
                    } else {
                        dash.classList.remove('heat-glow');
                        document.getElementById('heat-alert').style.display = 'none';
                        alarm.pause();
                    }
                });
            }
        }

        runTerminal();
        setInterval(monitorBattery, 1000);
        setLang('sw');
    </script>
</body>
</html>
