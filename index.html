<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SMART-RISITI | V41</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 15px; }
        
        .no-print { max-width: 500px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        label { display: block; font-size: 11px; color: var(--p); margin-top: 15px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 5px; box-sizing: border-box; outline: none; }
        
        .btn-gen { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; }

        /* RECEIPT DESIGN (PRINT AREA) */
        #receipt-area { display: none; background: #fff; color: #000; width: 100%; max-width: 400px; margin: 20px auto; padding: 30px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); font-family: 'Courier New', Courier, monospace; }
        .receipt-header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 15px; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px dotted #ccc; }
        .total-row { display: flex; justify-content: space-between; margin-top: 20px; border-top: 2px solid #000; padding-top: 10px; font-weight: bold; font-size: 18px; }

        .btn-join { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: #fff; text-decoration: none; padding: 15px; border-radius: 10px; margin-top: 30px; font-weight: bold; max-width: 500px; margin-left: auto; margin-right: auto; }

        @media print {
            .no-print, .btn-join { display: none !important; }
            #receipt-area { display: block !important; box-shadow: none; margin: 0 auto; }
            body { background: #fff; }
        }
    </style>
</head>
<body>

    <div class="no-print">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="font-size: 24px; font-weight: 900; color: var(--p); letter-spacing: 2px;">DVARY RISITI</div>
            <p style="font-size: 10px; color: #666;">TAYARISHA RISITI KWA SEKUNDE 10</p>
        </div>

        <label>Jina la Biashara Yako:</label>
        <input type="text" id="bizName" placeholder="Mfano: ELIA TECH STORE">

        <label>Jina la Mteja:</label>
        <input type="text" id="custName" placeholder="...">

        <label>Bidhaa Iliyouzwa:</label>
        <input type="text" id="itemName" placeholder="Mfano: iPhone 13 Pro">

        <label>Bei (TZS):</label>
        <input type="number" id="itemPrice" placeholder="Mfano: 1200000">

        <button class="btn-gen" onclick="generateReceipt()">TAYARISHA RISITI</button>
    </div>

    <div id="receipt-area">
        <div class="receipt-header">
            <h2 id="outBiz" style="margin: 0; text-transform: uppercase;">BIZ NAME</h2>
            <div style="font-size: 12px;">MTAALAMU WA TEKNOLOJIA NA BIASHARA</div>
            <div id="outDate" style="font-size: 10px; margin-top: 5px;"></div>
        </div>

        <div class="row"><span>MTEJA:</span> <span id="outCust">...</span></div>
        <div class="row"><span>BIDHAA:</span> <span id="outItem">...</span></div>
        <div class="row"><span>HALI:</span> <span style="color: green; font-weight: bold;">IMELIPWA</span></div>

        <div class="total-row">
            <span>JUMLA KUU:</span>
            <span id="outPrice">0</span>
        </div>

        <div style="margin-top: 30px; text-align: center; font-size: 11px;">
            ASANTE KWA KUFANYA BIASHARA NASI!<br>
            <strong>*** POWERED BY DVARY ***</strong>
        </div>

        <button class="no-print" style="width: 100%; margin-top: 20px; padding: 10px; background: #000; color: #fff; border: none; border-radius: 5px;" onclick="window.print()">CHAPA / SAVE PDF</button>
    </div>

    <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn-join no-print">
        <i class="fab fa-whatsapp"></i> JIUNGE NA DVARY ACADEMY
    </a>

    <script>
        function generateReceipt() {
            const biz = document.getElementById('bizName').value;
            const cust = document.getElementById('custName').value;
            const item = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            
            if(!biz || !cust || !item || !price) {
                alert("Mwalimu, jaza taarifa zote kwanza!");
                return;
            }

            const date = new Date().toLocaleString('sw-TZ');

            document.getElementById('outBiz').innerText = biz;
            document.getElementById('outCust').innerText = cust;
            document.getElementById('outItem').innerText = item;
            document.getElementById('outPrice').innerText = "TZS " + parseFloat(price).toLocaleString();
            document.getElementById('outDate').innerText = "TAREHE: " + date;

            document.getElementById('receipt-area').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
