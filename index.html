<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V48 FIX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0d1117; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; padding: 15px; text-align: center; }
        
        .logo { font-size: 24px; font-weight: 900; color: var(--p); text-shadow: 0 0 10px var(--p); margin-top: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; max-width: 450px; margin: 20px auto; }
        
        .ussd-box { background: #000; border: 2px dashed var(--p); padding: 15px; border-radius: 10px; font-size: 22px; font-weight: bold; color: var(--p); margin: 15px 0; }
        
        .btn-action { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-family: inherit; }
        .btn-copy { background: #ffcc00; color: #000; }
        .btn-verify { background: var(--p); color: #000; }
        .btn-join { background: #25d366; color: #fff; margin-top: 30px; }

        .tooltip { font-size: 10px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="logo">DVARY_SNIPER_V48</div>
    <p style="font-size: 11px; opacity: 0.7;">HAKIKI SIMU YAKO KITALAAMU</p>

    <div class="card">
        <p style="font-size: 13px; text-align: left; color: var(--p);">HATUA YA 1: PATA IMEI</p>
        <div class="ussd-box">*#06#</div>
        
        <button class="btn-action btn-copy" onclick="copyCode()">
            <i class="fas fa-copy"></i> COPY & OPEN DIALER
        </button>
        <p class="tooltip">Ukibonyeza, kodi itanakiliwa. I-paste kwenye sehemu ya kupigia simu.</p>

        <hr style="border: 0; border-top: 1px solid #222; margin: 25px 0;">

        <p style="font-size: 13px; text-align: left; color: var(--p);">HATUA YA 2: HAKIKI DUNIANI</p>
        <button class="btn-action btn-verify" onclick="window.open('https://www.imei.info', '_blank')">
            <i class="fas fa-globe"></i> HAKIKI KWENYE MFUMO
        </button>
    </div>

    <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn-action btn-join">
        <i class="fab fa-whatsapp"></i> JIUNGE NA CHANNEL YETU
    </a>

    <script>
        function copyCode() {
            const code = "*#06#";
            navigator.clipboard.writeText(code).then(() => {
                alert("Kodi ya " + code + " imeshanakiliwa (Copied)! Sasa i-paste kwenye dialer yako.");
                window.location.href = "tel:";
            }).catch(err => {
                window.location.href = "tel:";
            });
        }
    </script>
</body>
</html>
