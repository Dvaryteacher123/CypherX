<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V100 ULTIMATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #000; --card: #0a0d14; --danger: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 20px var(--p); }
        .logo { font-size: 18px; font-weight: 900; color: var(--p); letter-spacing: 2px; }

        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* Dashboard Global */
        .dash-circle { width: 170px; height: 170px; border: 4px solid #111; border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top-color: var(--p); border-left-color: var(--p); animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0% { box-shadow: 0 0 5px var(--p); } 50% { box-shadow: 0 0 25px var(--p); } 100% { box-shadow: 0 0 5px var(--p); } }

        /* 100+ COMMANDS TERMINAL */
        .terminal-box { background: #000; border: 1px solid #333; border-radius: 8px; height: 180px; margin: 15px 0; padding: 10px; overflow-y: hidden; text-align: left; }
        .line { font-size: 9px; color: var(--p); margin: 1px 0; opacity: 0; animation: fadeLine 0.1s forwards; }
        @keyframes fadeLine { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 10px; border-radius: 8px; text-align: left; }
        .v { font-size: 12px; font-weight: bold; color: var(--p); }

        .btn-action { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-family: inherit; font-size: 13px; }
        .btn-panic { background: var(--danger); color: #fff; }
        .btn-join { background: #25d366; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">DVARY_SNIPER_V100</div>
        <div id="clock" style="font-size: 12px; color: var(--p);">00:00:00</div>
    </div>

    <div class="container">
        <div class="dash-circle">
            <span id="batPer" style="font-size: 50px; font-weight: bold;">0%</span>
            <span id="batTemp" style="color: #ffcc00; font-size: 12px;">32.0°C</span>
        </div>

        <div class="terminal-box" id="term"></div>

        <div class="grid">
            <div class="card"><span style="font-size: 8px; color: #555;">OS_ARCH:</span><br><span id="os-v" class="v">Scanning...</span></div>
            <div class="card"><span style="font-size: 8px; color: #555;">IP_ADDR:</span><br><span id="ip-v" class="v">192.168.1.*</span></div>
            <div class="card"><span style="font-size: 8px; color: #555;">CPU_THREADS:</span><br><span id="cpu-v" class="v">...</span></div>
            <div class="card"><span style="font-size: 8px; color: #555;">NETWORK:</span><br><span id="net-v" class="v">ONLINE</span></div>
        </div>

        <button class="btn-action btn-panic" onclick="activateSniper()">
            <i class="fas fa-skull-crossbones"></i> START SYSTEM OVERHAUL
        </button>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn-action btn-join">
            <i class="fab fa-whatsapp"></i> JIUNGE NA DVARY ACADEMY
        </a>
    </div>

    <audio id="alertSound">
        <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3" type="audio/mpeg">
    </audio>

    <script>
        const term = document.getElementById('term');
        const batPer = document.getElementById('batPer');
        const batTemp = document.getElementById('batTemp');

        // Kuzalisha 100+ Real Commands
        const commandParts = [
            "FETCHING_KERNEL_INFO", "SYNCING_HARDWARE_RESOURCES", "ANALYZING_THERMAL_THROTTLING",
            "SCANNING_DATA_PACKETS", "ENCRYPTING_AES_LAYER", "CPU_LOAD_OPTIMIZATION",
            "MEMORY_BUFFER_CLEARING", "NETWORK_LATENCY_CHECK", "INTERNAL_GPU_IDLE",
            "THREAD_SCHEDULER_ACTIVE", "FIREWALL_RULE_SETTING", "PARTITION_CHECKING",
            "UPLOADING_LOGS_TO_DVARY", "SYSTEM_ROOT_HANDSHAKE", "SIGNAL_MODULATION"
        ];

        function startTerminal() {
            setInterval(() => {
                const line = document.createElement('div');
                line.className = 'line';
                const randomPart = commandParts[Math.floor(Math.random() * commandParts.length)];
                const randomHex = Math.random().toString(16).substr(2, 6).toUpperCase();
                line.innerText = `> [0x${randomHex}] ${randomPart} ... OK`;
                term.appendChild(line);
                if (term.childNodes.length > 12) term.removeChild(term.firstChild);
            }, 150); // Inakimbia haraka sana kuonyesha utaalamu
        }

        function updateSystem() {
            // Real-time info
            document.getElementById('os-v').innerText = navigator.platform;
            document.getElementById('cpu-v').innerText = (navigator.hardwareConcurrency || 8) + " CORES";
            document.getElementById('net-v').innerText = navigator.onLine ? "CONNECTED" : "OFFLINE";
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();

            if ('getBattery' in navigator) {
                navigator.getBattery().then(bat => {
                    batPer.innerText = Math.round(bat.level * 100) + "%";
                    batTemp.innerText = (bat.charging ? 38.5 : 32.2) + "°C";
                });
            }
        }

        function activateSniper() {
            const sound = document.getElementById('alertSound');
            sound.play();
            alert("V100 MASTER SYSTEM ACTIVE! Sasa kila kodi inafanya kazi kitalaamu.");
            setTimeout(() => { sound.pause(); }, 4000);
        }

        startTerminal();
        setInterval(updateSystem, 1000);
        updateSystem();
    </script>
</body>
</html>
