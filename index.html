<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | DEVICE INFO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 20px; }
        
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--p); margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--p); letter-spacing: 4px; }

        .card { background: var(--card); border: 1px solid #222; border-radius: 15px; padding: 25px; max-width: 450px; margin: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--p), transparent); animation: scan 2s linear infinite; }
        @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; }
        .label { color: var(--p); text-transform: uppercase; font-weight: bold; }
        .val { color: #fff; text-align: right; }

        .btn-scan { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 25px; font-family: inherit; font-size: 16px; }
        
        .channel-link { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25d366; color: #fff; text-decoration: none; padding: 15px; border-radius: 10px; margin-top: 30px; font-weight: bold; max-width: 450px; margin-left: auto; margin-right: auto; font-family: 'Poppins', sans-serif; }

        .footer { text-align: center; font-size: 10px; color: #444; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">DVARY_SNIPER_V43</div>
        <p style="font-size: 10px; color: #555;">[ DEVICE & NETWORK INTELLIGENCE ]</p>
    </div>

    <div class="card">
        <div id="loading" style="text-align: center; padding: 20px;">
            <i class="fas fa-microchip fa-spin" style="font-size: 40px; color: var(--p);"></i>
            <p id="status">Kusoma mfumo wa simu...</p>
        </div>

        <div id="results" style="display: none;">
            <div class="info-row">
                <span class="label">MFUMO (OS):</span>
                <span class="val" id="os">...</span>
            </div>
            <div class="info-row">
                <span class="label">KIOO (RES):</span>
                <span class="val" id="res">...</span>
            </div>
            <div class="info-row">
                <span class="label">LUGHA:</span>
                <span class="val" id="lang">...</span>
            </div>
            <div class="info-row">
                <span class="label">BROWSER:</span>
                <span class="val" id="browser">...</span>
            </div>
            <div class="info-row">
                <span class="label">ONLINE:</span>
                <span class="val" id="online" style="color: #00ff00;">YES</span>
            </div>
            
            <button class="btn-scan" onclick="location.reload()">RE-SCAN DEVICE</button>
        </div>
    </div>

    <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="channel-link">
        <i class="fab fa-whatsapp"></i> JIUNGE NA CHANNEL YA KAMANDA ELIA
    </a>

    <div class="footer">
        DEVELOPED BY KAMANDA ELIA | TECHNOLOGY EDUCATOR<br>
        © 2026 DVARY ACADEMY TANZANIA
    </div>

    <script>
        setTimeout(() => {
            const results = document.getElementById('results');
            const loading = document.getElementById('loading');
            
            // Pata taarifa za simu
            document.getElementById('os').innerText = navigator.platform;
            document.getElementById('res').innerText = window.screen.width + "x" + window.screen.height;
            document.getElementById('lang').innerText = navigator.language.toUpperCase();
            document.getElementById('browser').innerText = navigator.appName;
            document.getElementById('online').innerText = navigator.onLine ? "CONNECTED" : "OFFLINE";

            loading.style.display = 'none';
            results.style.display = 'block';
        }, 2000);
    </script>
</body>
</html>
