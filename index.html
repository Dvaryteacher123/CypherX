<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V105 PRO MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #000; --danger: #ff003c; --card: #0a0d14; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 16px; font-weight: 900; color: var(--p); text-shadow: 0 0 10px var(--p); }

        .lang-btn { background: none; border: 1px solid var(--p); color: var(--p); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-left: 5px; }
        .lang-btn.active { background: var(--p); color: #000; }

        .container { max-width: 500px; margin: auto; padding: 15px; text-align: center; }

        /* Clock & Device */
        .top-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--p); margin-bottom: 10px; }

        /* Dashboard */
        .dash-circle { width: 180px; height: 180px; border: 6px solid #111; border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top-color: var(--p); border-left-color: var(--p); box-shadow: 0 0 20px rgba(0,255,204,0.2); transition: 0.5s; }
        .heat-mode { border-color: var(--danger) !important; box-shadow: 0 0 40px var(--danger); animation: pulse 0.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.7; } }

        /* Terminal 100+ Commands */
        .terminal { background: #050810; border: 1px solid #222; border-radius: 10px; height: 130px; margin: 15px 0; padding: 10px; overflow: hidden; text-align: left; }
        .line { font-size: 9px; color: var(--p); margin: 1px 0; font-family: 'Courier New', monospace; }

        /* Grid Statistics */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 12px; border-radius: 10px; text-align: left; }
        .card-t { font-size: 9px; color: #555; text-transform: uppercase; display: block; }
        .card-v { font-size: 13px; font-weight: bold; color: #fff; margin-top: 3px; display: block; }

        .btn-join { background: #25d366; color: #fff; padding: 16px; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">DVARY_SNIPER_V105</div>
        <div>
            <button id="btn-sw" class="lang-btn active" onclick="setLang('sw')">SW</button>
            <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="container">
        <div class="top-info">
            <span id="txt-device">DEVICE: ANALYZING...</span>
            <span id="clock">00:00:00</span>
        </div>

        <div class="dash-circle" id="mainDash">
            <span style="font-size: 10px; color: #666;" id="txt-lvl">LEVEL</span>
            <span id="batPer" style="font-size: 55px; font-weight: bold;">0%</span>
            <span id="batTemp" style="color: #ffcc00; font-size: 16px; font-weight: bold;">32.0°C</span>
        </div>

        <div class="terminal" id="term"></div>

        <div class="grid">
            <div class="card"><span class="card-t" id="t-status">HALI</span><span class="card-v" id="val-status">...</span></div>
            <div class="card"><span class="card-t" id="t-ram">RAM / STORAGE</span><span class="card-v" id="val-storage">8GB / 128GB</span></div>
            <div class="card"><span class="card-t" id="t-cpu">CPU THREADS</span><span class="card-v" id="val-cpu">...</span></div>
            <div class="card"><span class="card-t" id="t-health">AFYA YA MFUMO</span><span class="card-v" style="color:var(--p)">EXCELLENT</span></div>
        </div>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn-join">
            <i class="fab fa-whatsapp" style="margin-right:10px; font-size: 20px;"></i> <span id="t-join">JIUNGE NA CHANNEL YETU</span>
        </a>
    </div>

    <audio id="alarm"><source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3"></audio>

    <script>
        let currentLang = 'sw';
        const term = document.getElementById('term');
        const alarm = document.getElementById('alarm');

        const dictionary = {
            sw: { lvl: "ASILIMIA", status: "HALI", ram: "RAM / STORAGE", cpu: "CPU THREADS", health: "AFYA YA MFUMO", join: "JIUNGE NA CHANNEL YETU", connect: "IMEUNGANISHWA", disconnect: "HAICHAJI", device: "SIMU:", logs: ["KUHAKIKI RAM...", "USALAMA WA DATA...", "PROTOCALI ZA DVARY...", "UCHAMBUZI WA KERNEL...", "KUREKEBISHA BETRI...", "HAKIKI JOTO...", "LINDA MFUMO..."] },
            en: { lvl: "LEVEL", status: "STATUS", ram: "RAM / STORAGE", cpu: "CPU THREADS", health: "SYSTEM HEALTH", join: "JOIN OUR CHANNEL", connect: "CONNECTED", disconnect: "DISCONNECTED", device: "MODEL:", logs: ["SCANNING RAM...", "DATA SECURITY...", "DVARY PROTOCOLS...", "KERNEL ANALYSIS...", "BATTERY CALIBRATION...", "TEMP CHECK...", "SECURE SYSTEM..."] }
        };

        function setLang(l) {
            currentLang = l;
            document.getElementById('btn-sw').classList.toggle('active', l==='sw');
            document.getElementById('btn-en').classList.toggle('active', l==='en');
            document.getElementById('txt-lvl').innerText = dictionary[l].lvl;
            document.getElementById('t-status').innerText = dictionary[l].status;
            document.getElementById('t-ram').innerText = dictionary[l].ram;
            document.getElementById('t-cpu').innerText = dictionary[l].cpu;
            document.getElementById('t-health').innerText = dictionary[l].health;
            document.getElementById('t-join').innerText = dictionary[l].join;
            updateUI();
        }

        function runTerminal() {
            setInterval(() => {
                const line = document.createElement('div');
                line.className = 'line';
                const baseLogs = dictionary[currentLang].logs;
                const log = baseLogs[Math.floor(Math.random()*baseLogs.length)];
                line.innerText = `> [${new Date().toLocaleTimeString()}] ${log} [0x${Math.random().toString(16).substr(2,4).toUpperCase()}] ... OK`;
                term.appendChild(line);
                if(term.childNodes.length > 8) term.removeChild(term.firstChild);
            }, 300);
        }

        function updateUI() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            document.getElementById('txt-device').innerText = dictionary[currentLang].device + " " + (navigator.platform.includes('Win') ? "PC/WINDOWS" : "ANDROID/MOBILE");
            document.getElementById('val-cpu').innerText = (navigator.hardwareConcurrency || 8) + " CORES ACTIVE";

            if('getBattery' in navigator) {
                navigator.getBattery().then(bat => {
                    const level = Math.round(bat.level * 100);
                    document.getElementById('batPer').innerText = level + "%";
                    document.getElementById('val-status').innerText = bat.charging ? dictionary[currentLang].connect : dictionary[currentLang].disconnect;

                    // Heat Logic
                    let temp = bat.charging ? 41.5 : 32.8;
                    document.getElementById('batTemp').innerText = temp + "°C";

                    const dash = document.getElementById('mainDash');
                    if(temp >= 40) {
                        dash.classList.add('heat-mode');
                        alarm.play();
                    } else {
                        dash.classList.remove('heat-mode');
                        alarm.pause();
                    }
                });
            }
        }

        runTerminal();
        setInterval(updateUI, 1000);
        setLang('sw');
    </script>
</body>
</html>
