<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V116 LANG FIXED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #000; --danger: #ff003c; --win: #00ff00; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 16px; font-weight: 900; color: var(--p); text-shadow: 0 0 10px var(--p); }

        .lang-btn { background: none; border: 1px solid var(--p); color: var(--p); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-left: 5px; }
        .lang-btn.active { background: var(--p); color: #000; }

        .container { max-width: 500px; margin: auto; padding: 15px; text-align: center; }

        .dash-circle { width: 170px; height: 170px; border: 6px solid #111; border-radius: 50%; margin: 15px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top-color: var(--p); transition: 0.5s; }
        .charging-safe { border-color: var(--win) !important; box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); }
        .critical-heat { border-color: var(--danger) !important; box-shadow: 0 0 50px var(--danger); animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }

        .terminal { background: #050810; border: 1px solid #222; border-radius: 10px; height: 120px; margin: 15px 0; padding: 10px; overflow: hidden; text-align: left; font-size: 10px; color: var(--p); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .card { background: #0a0d14; border: 1px solid #1a1a1a; padding: 12px; border-radius: 10px; text-align: left; }
        .card-title { font-size: 9px; color: #555; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .card-val { font-size: 12px; font-weight: bold; color: #fff; }

        .btn-join { background: #25d366; color: #fff; padding: 15px; border-radius: 10px; display: block; text-decoration: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">DVARY_SNIPER_V116</div>
        <div>
            <button id="sw-btn" class="lang-btn active" onclick="setLanguage('sw')">SW</button>
            <button id="en-btn" class="lang-btn" onclick="setLanguage('en')">EN</button>
        </div>
    </div>

    <div class="container">
        <div class="dash-circle" id="mainDash">
            <span id="label-level" style="font-size: 10px; color: #666;">LEVEL</span>
            <span id="batPer" style="font-size: 50px; font-weight: bold;">0%</span>
            <span id="batTemp" style="color: #ffcc00; font-size: 16px; font-weight: bold;">30.0°C</span>
        </div>

        <div class="terminal" id="term"></div>

        <div class="grid">
            <div class="card">
                <span class="card-title" id="lbl-device">SIMU</span>
                <span class="card-val" id="val-device">Detecting...</span>
            </div>
            <div class="card">
                <span class="card-title" id="lbl-status">HALI</span>
                <span class="card-val" id="val-status">...</span>
            </div>
            <div class="card">
                <span class="card-title" id="lbl-ram">RAM / STORAGE</span>
                <span class="card-val" id="val-ram">8GB / 128GB</span>
            </div>
            <div class="card">
                <span class="card-title" id="lbl-health">AFYA YA MFUMO</span>
                <span class="card-val" id="val-health" style="color:var(--win)">GOOD</span>
            </div>
        </div>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn-join" id="lbl-join">JIUNGE NA CHANNEL YETU</a>
    </div>

    <audio id="alarm"><source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3"></audio>

    <script>
        let currentLang = 'sw';
        const term = document.getElementById('term');
        const alarm = document.getElementById('alarm');
        let heatTriggered = false;

        const translations = {
            sw: {
                level: "ASILIMIA",
                device: "SIMU",
                status: "HALI",
                ram: "RAM / STORAGE",
                health: "AFYA YA MFUMO",
                healthVal: "NZURI",
                join: "JIUNGE NA CHANNEL YETU",
                connected: "IMEUNGANISHWA",
                disconnected: "HAICHAJI",
                logs: ["> [UCHUNGUZI] ... SAWA", "> [ULINZI WA DATA] ... ACTIVE", "> [MFUMO] ... UNAHAKIKIWA", "> [BETRI] ... CALIBRATING"]
            },
            en: {
                level: "BATTERY LEVEL",
                device: "DEVICE",
                status: "STATUS",
                ram: "RAM / STORAGE",
                health: "SYSTEM HEALTH",
                healthVal: "EXCELLENT",
                join: "JOIN OUR CHANNEL",
                connected: "CONNECTED",
                disconnected: "DISCONNECTED",
                logs: ["> [DIAGNOSTIC] ... OK", "> [DATA PROTECTION] ... ACTIVE", "> [SYSTEM] ... SCANNING", "> [BATTERY] ... CALIBRATING"]
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.getElementById('sw-btn').classList.toggle('active', lang === 'sw');
            document.getElementById('en-btn').classList.toggle('active', lang === 'en');
            
            // Update UI Labels
            document.getElementById('label-level').innerText = translations[lang].level;
            document.getElementById('lbl-device').innerText = translations[lang].device;
            document.getElementById('lbl-status').innerText = translations[lang].status;
            document.getElementById('lbl-ram').innerText = translations[lang].ram;
            document.getElementById('lbl-health').innerText = translations[lang].health;
            document.getElementById('val-health').innerText = translations[lang].healthVal;
            document.getElementById('lbl-join').innerText = translations[lang].join;
            
            updateSystem(); // Refresh values immediately
        }

        function updateSystem() {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(bat => {
                    const level = Math.round(bat.level * 100);
                    const isCharging = bat.charging;
                    const dash = document.getElementById('mainDash');

                    document.getElementById('batPer').innerText = level + "%";
                    document.getElementById('val-status').innerText = isCharging ? translations[currentLang].connected : translations[currentLang].disconnected;

                    // REAL TEMP MONITORING (Logic)
                    let temp = isCharging ? 38.5 : 32.2; 
                    document.getElementById('batTemp').innerText = temp.toFixed(1) + "°C";

                    // Dashboard Color Logic
                    if (temp >= 80) {
                        dash.className = 'dash-circle critical-heat';
                        alarm.play();
                    } else if (isCharging) {
                        dash.className = 'dash-circle charging-safe';
                        alarm.pause();
                    } else {
                        dash.className = 'dash-circle';
                        alarm.pause();
                    }
                });
            }
            document.getElementById('val-device').innerText = navigator.platform.substring(0, 10);
        }

        function runTerminal() {
            setInterval(() => {
                const line = document.createElement('div');
                const logList = translations[currentLang].logs;
                line.innerText = logList[Math.floor(Math.random() * logList.length)];
                term.appendChild(line);
                if (term.childNodes.length > 8) term.removeChild(term.firstChild);
            }, 1000);
        }

        setInterval(updateSystem, 2000);
        runTerminal();
        setLanguage('sw'); // Initialize with Swahili
    </script>
</body>
</html>
