<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V51 ALARM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0d1117; --danger: #ff3333; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; text-align: center; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222; }
        .nav-btns button { background: none; border: 1px solid var(--p); color: var(--p); padding: 5px 12px; border-radius: 5px; cursor: pointer; }

        .container { max-width: 450px; margin: auto; padding: 20px; }
        .logo { font-size: 22px; font-weight: 900; color: var(--p); letter-spacing: 2px; text-shadow: 0 0 10px var(--p); }

        /* Joto Display */
        .temp-circle { width: 150px; height: 150px; border: 5px solid var(--p); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; box-shadow: 0 0 20px rgba(0,255,204,0.2); }
        .temp-val { font-size: 40px; font-weight: bold; }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #222; margin-top: 20px; text-align: left; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 14px; }

        /* Alarm UI */
        #alarm-status { display: none; background: var(--danger); color: #fff; padding: 15px; border-radius: 10px; margin-top: 15px; animation: blink 0.5s infinite; font-weight: bold; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .btn-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-family: inherit; }
        .btn-join { background: #25d366; color: #fff; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="color: var(--p); font-size: 12px;"><i class="fas fa-shield-alt"></i> SYSTEM SECURE</div>
        <div class="nav-btns">
            <button onclick="setLang('sw')">SW</button>
            <button onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="container">
        <div class="logo">BATTERY_SNIPER_V51</div>
        
        <div class="temp-circle" id="t-circle">
            <span style="font-size: 10px; color: #888;" id="l-temp-title">JOTO LA NDANI</span>
            <span class="temp-val" id="currTemp">32°C</span>
        </div>

        <div id="alarm-status">
            <i class="fas fa-exclamation-triangle"></i> <span id="l-warn">SIMU INA MOTO SANA! IPOE KWANZA!</span>
        </div>

        <div class="card">
            <div class="info-row"><span id="l-stat">HALI:</span> <span id="batStatus">Reading...</span></div>
            <div class="info-row"><span id="l-health">AFYA:</span> <span style="color: #00ff00;">GOOD</span></div>
            <div class="info-row"><span id="l-limit">ALARM LIMIT:</span> <span style="color: var(--danger);">40°C</span></div>
        </div>

        <button class="btn-action" style="background: #ffcc00; color: #000;" onclick="testAlarm()">
            <i class="fas fa-bell"></i> TEST OVERHEAT ALARM
        </button>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn-action btn-join">
            <i class="fab fa-whatsapp"></i> JIUNGE NA CHANNEL YETU
        </a>
    </div>

    <audio id="alarmAudio">
        <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3" type="audio/mpeg">
    </audio>

    <script>
        let alarmTriggered = false;
        const alarmAudio = document.getElementById('alarmAudio');

        function checkTemperature() {
            // Kitalaamu, Browser haziruhusu kusoma 'Internal CPU Temp' moja kwa moja kwa usalama.
            // Hapa tunatumia 'Battery Temperature' ya simulizi au logic ya kitalaamu.
            // Kwa ajili ya DEMO ya TikTok, tunaweka namba inayobadilika.
            
            let temp = Math.floor(Math.random() * (42 - 30 + 1)) + 30;
            document.getElementById('currTemp').innerText = temp + "°C";

            if (temp >= 40) {
                triggerAlarm();
            } else {
                stopAlarm();
            }
        }

        function triggerAlarm() {
            document.getElementById('t-circle').style.borderColor = 'red';
            document.getElementById('t-circle').style.color = 'red';
            document.getElementById('alarm-status').style.display = 'block';
            alarmAudio.play();
            alarmTriggered = true;
        }

        function stopAlarm() {
            document.getElementById('t-circle').style.borderColor = '#00ffcc';
            document.getElementById('t-circle').style.color = '#fff';
            document.getElementById('alarm-status').style.display = 'none';
            alarmAudio.pause();
            alarmTriggered = false;
        }

        function testAlarm() {
            alert("Mwalimu, hii ni test ya jinsi simu itakavyopiga kelele ikipata moto!");
            triggerAlarm();
            setTimeout(stopAlarm, 5000);
        }

        setInterval(checkTemperature, 5000);

        // Battery Status
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function update() {
                    document.getElementById('batStatus').innerText = battery.charging ? "CHARGING..." : "DISCHARGING";
                }
                update();
                battery.addEventListener('chargingchange', update);
            });
        }
    </script>
</body>
</html>
