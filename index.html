<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V101 NOTIFICATION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #000; --danger: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; overflow: hidden; }
        
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 18px; font-weight: 900; color: var(--p); text-shadow: 0 0 10px var(--p); }

        .container { max-width: 500px; margin: auto; padding: 15px; text-align: center; }

        /* Dashboard */
        .dash-circle { width: 170px; height: 170px; border: 5px solid #111; border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border-top-color: var(--p); transition: 0.5s; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        .heat-active { border-color: var(--danger) !important; box-shadow: 0 0 40px var(--danger); animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }

        .terminal { background: #050810; border: 1px solid #222; border-radius: 10px; height: 120px; margin: 15px 0; padding: 10px; overflow: hidden; text-align: left; font-size: 10px; color: var(--p); }

        .btn-setup { background: var(--p); color: #000; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">DVARY_SNIPER_V101</div>
        <div style="font-size: 10px; color: var(--p);">[ SECURITY_ON ]</div>
    </div>

    <div class="container">
        <button id="notifBtn" class="btn-setup" onclick="requestPermission()">
            <i class="fas fa-bell"></i> RUHUSU SMS ZA ONYO (ALLOW NOTIFICATIONS)
        </button>

        <div class="dash-circle" id="mainDash">
            <span id="batPer" style="font-size: 45px; font-weight: bold;">0%</span>
            <span id="batTemp" style="color: #ffcc00; font-size: 14px;">32.0°C</span>
        </div>

        <div class="terminal" id="term"></div>

        <div style="background:#0a0d14; padding:15px; border-radius:10px; border:1px solid #1a1a1a; text-align:left;">
            <span style="font-size:9px; color:#555;">SYSTEM ADVISOR:</span>
            <p id="ai-msg" style="font-size:12px; margin:5px 0;">Mfumo upo tayari kukulinda...</p>
        </div>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" style="background:#25d366; color:#fff; padding:15px; border-radius:8px; display:flex; align-items:center; justify-content:center; text-decoration:none; margin-top:15px; font-weight:bold; font-size:13px;">
            <i class="fab fa-whatsapp" style="margin-right:10px;"></i> JIUNGE NA CHANNEL YETU
        </a>
    </div>

    <audio id="alarmSound"><source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3"></audio>

    <script>
        const term = document.getElementById('term');
        const mainDash = document.getElementById('mainDash');
        const alarm = document.getElementById('alarmSound');
        let notifSent = false;

        // Omba ruhusa ya kutuma SMS/Notification
        function requestPermission() {
            Notification.requestPermission().then(perm => {
                if(perm === "granted") {
                    alert("Shukrani Elia! Sasa utapata SMS simu ikipata moto.");
                    document.getElementById('notifBtn').style.display = 'none';
                }
            });
        }

        function sendHeatSMS() {
            if (Notification.permission === "granted" && !notifSent) {
                new Notification("⚠️ ONYO LA DVARY SNIPER", {
                    body: "SIMU INA MOTO SANA! (40°C+). Iakue sasa hivi kuepuka uharibifu!",
                    icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png"
                });
                notifSent = true; // Inatuma mara moja tu mpaka joto lishuke
            }
        }

        function runTerminal() {
            setInterval(() => {
                const line = document.createElement('div');
                line.innerText = `> [${new Date().toLocaleTimeString()}] MONITORING_THERMAL_STATE... OK`;
                term.appendChild(line);
                if(term.childNodes.length > 6) term.removeChild(term.firstChild);
            }, 2000);
        }

        function monitorSystem() {
            if('getBattery' in navigator) {
                navigator.getBattery().then(bat => {
                    const level = Math.round(bat.level * 100);
                    document.getElementById('batPer').innerText = level + "%";
                    
                    // JOTO SIMULATION (Ikiwa inachaji tuna-trigger alarm kwa ajili ya kukuonyesha)
                    let temp = bat.charging ? 41.5 : 32.8;
                    document.getElementById('batTemp').innerText = temp + "°C";

                    if(temp >= 40) {
                        mainDash.classList.add('heat-active');
                        alarm.play();
                        if(window.navigator.vibrate) window.navigator.vibrate([500, 200, 500]);
                        sendHeatSMS();
                        document.getElementById('ai-msg').innerText = "HATARI! Toa simu kwenye chaja sasa hivi!";
                        document.getElementById('ai-msg').style.color = "red";
                    } else {
                        mainDash.classList.remove('heat-active');
                        alarm.pause();
                        notifSent = false;
                        document.getElementById('ai-msg').innerText = "Simu yako ipo salama.";
                        document.getElementById('ai-msg').style.color = "#00ffcc";
                    }
                });
            }
        }

        runTerminal();
        setInterval(monitorSystem, 2000);
    </script>
</body>
</html>
