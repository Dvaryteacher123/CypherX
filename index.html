<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V110 EXTREME</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #000; --danger: #ff003c; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { padding: 15px; background: #000; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 16px; font-weight: 900; color: var(--p); text-shadow: 0 0 10px var(--p); }

        .lang-btn { background: none; border: 1px solid var(--p); color: var(--p); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-left: 5px; }
        .lang-btn.active { background: var(--p); color: #000; }

        .container { max-width: 500px; margin: auto; padding: 15px; text-align: center; }

        /* Dashboard */
        .dash-circle { width: 180px; height: 180px; border: 6px solid #111; border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; border-top-color: var(--p); transition: 0.3s; }
        .critical-heat { border-color: var(--danger) !important; box-shadow: 0 0 50px var(--danger); animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }

        /* Notification/SMS Prompt */
        .notif-bar { background: var(--p); color: #000; padding: 10px; font-weight: bold; font-size: 12px; border: none; width: 100%; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }

        .terminal { background: #050810; border: 1px solid #222; border-radius: 10px; height: 120px; margin: 15px 0; padding: 10px; overflow: hidden; text-align: left; }
        .line { font-size: 9px; color: var(--p); margin: 1px 0; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .card { background: #0a0d14; border: 1px solid #1a1a1a; padding: 12px; border-radius: 10px; text-align: left; }
        .v { font-size: 13px; font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">DVARY_SNIPER_V110</div>
        <div>
            <button id="btn-sw" class="lang-btn active" onclick="setLang('sw')">SW</button>
            <button id="btn-en" class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </div>

    <div class="container">
        <button class="notif-bar" onclick="enableNotif()">ACTIVATE SMS ALARM (ON/OFF)</button>

        <div class="dash-circle" id="mainDash">
            <span id="batPer" style="font-size: 55px; font-weight: bold;">0%</span>
            <span id="batTemp" style="color: #ffcc00; font-size: 16px; font-weight: bold;">0°C</span>
        </div>

        <div class="terminal" id="term"></div>

        <div class="grid">
            <div class="card"><span id="t-device" style="font-size:9px; color:#555;">SIMU</span><br><span id="val-device" class="v">Analyzing...</span></div>
            <div class="card"><span id="t-time" style="font-size:9px; color:#555;">SAA</span><br><span id="val-time" class="v">00:00:00</span></div>
            <div class="card"><span id="t-status" style="font-size:9px; color:#555;">HALI</span><br><span id="val-status" class="v">...</span></div>
            <div class="card"><span id="t-storage" style="font-size:9px; color:#555;">STORAGE</span><br><span class="v">128GB / 8GB</span></div>
        </div>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" style="background:#25d366; color:#fff; padding:15px; border-radius:10px; display:block; text-decoration:none; font-weight:bold;">JIUNGE NA CHANNEL YETU</a>
    </div>

    <audio id="alarm"><source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3"></audio>

    <script>
        let currentLang = 'sw';
        const term = document.getElementById('term');
        const alarm = document.getElementById('alarm');
        let notifSent = false;

        const dict = {
            sw: { device: "SIMU", time: "SAA", status: "HALI", connect: "IMEUNGANISHWA", disconnect: "HAICHAJI", smsHead: "⚠️ HATARI: JOTO KALI!", smsBody: "Simu imefika 80°C! Iakue sasa hivi!", logs: ["UCHUNGUZI WA JOTO...", "LINDA MFUMO...", "HAKIKI BETRI...", "USAHIHI WA DATA..."] },
            en: { device: "DEVICE", time: "TIME", status: "STATUS", connect: "CONNECTED", disconnect: "DISCONNECTED", smsHead: "⚠️ DANGER: OVERHEAT!", smsBody: "Phone reached 80°C! Turn it off now!", logs: ["TEMP MONITORING...", "SYSTEM SECURE...", "BATTERY CHECK...", "DATA INTEGRITY..."] }
        };

        function setLang(l) {
            currentLang = l;
            document.getElementById('btn-sw').classList.toggle('active', l==='sw');
            document.getElementById('btn-en').classList.toggle('active', l==='en');
            document.getElementById('t-device').innerText = dict[l].device;
            document.getElementById('t-time').innerText = dict[l].time;
            document.getElementById('t-status').innerText = dict[l].status;
        }

        function enableNotif() {
            Notification.requestPermission().then(p => { if(p==='granted') alert("SMS/Notification imewashwa!"); });
        }

        function sendSMS() {
            if(Notification.permission === 'granted' && !notifSent) {
                new Notification(dict[currentLang].smsHead, { body: dict[currentLang].smsBody });
                notifSent = true;
            }
        }

        function runSystem() {
            const now = new Date();
            document.getElementById('val-time').innerText = now.toLocaleTimeString();
            document.getElementById('val-device').innerText = navigator.platform.substring(0,10);

            if('getBattery' in navigator) {
                navigator.getBattery().then(bat => {
                    document.getElementById('batPer').innerText = Math.round(bat.level * 100) + "%";
                    document.getElementById('val-status').innerText = bat.charging ? dict[currentLang].connect : dict[currentLang].disconnect;

                    // KIIGIZO CHA JOTO (Simulate 80C if charging for demo)
                    let temp = bat.charging ? 80.5 : 34.2; 
                    document.getElementById('batTemp').innerText = temp + "°C";

                    if(temp >= 80) {
                        document.getElementById('mainDash').classList.add('critical-heat');
                        alarm.play();
                        sendSMS();
                        if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
                    } else {
                        document.getElementById('mainDash').classList.remove('critical-heat');
                        alarm.pause();
                        notifSent = false;
                    }
                });
            }

            // Commands 100+ Logic
            const line = document.createElement('div');
            line.className = 'line';
            const log = dict[currentLang].logs[Math.floor(Math.random()*4)];
            line.innerText = `> [${now.toLocaleTimeString()}] ${log} ... OK`;
            term.appendChild(line);
            if(term.childNodes.length > 8) term.removeChild(term.firstChild);
        }

        setInterval(runSystem, 1000);
        setLang('sw');
    </script>
</body>
</html>
