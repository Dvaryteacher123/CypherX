<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVARY SNIPER | V54 MULTI-LANG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ffcc; --bg: #050810; --card: #0d1117; --danger: #ff3333; }
        body { background: var(--bg); color: #fff; font-family: 'Share Tech Mono', monospace; margin: 0; padding: 0; }
        
        .nav-header { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 18px; font-weight: 900; color: var(--p); letter-spacing: 2px; }

        .lang-btn { background: none; border: 1px solid var(--p); color: var(--p); padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; margin-left: 5px; transition: 0.3s; }
        .lang-btn.active { background: var(--p); color: #000; }

        .container { max-width: 500px; margin: auto; padding: 15px; text-align: center; }

        .dash-circle { width: 200px; height: 200px; border: 8px solid #1a1a1a; border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,255,204,0.1); border-top-color: var(--p); border-left-color: var(--p); }
        .percent-val { font-size: 50px; font-weight: bold; }

        .ai-box { background: rgba(0, 255, 204, 0.05); border: 1px solid var(--p); padding: 15px; border-radius: 15px; margin: 20px 0; display: flex; align-items: center; gap: 15px; text-align: left; }
        
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-card { background: var(--card); border: 1px solid #222; padding: 15px; border-radius: 12px; text-align: left; }
        .opt-card i { color: var(--p); margin-bottom: 8px; }
        .opt-title { font-size: 10px; color: #888; text-transform: uppercase; }
        .opt-val { font-size: 13px; font-weight: bold; display: block; margin-top: 4px; }

        .btn-full { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; font-size: 14px; text-decoration: none; }
        .btn-alarm { background: var(--danger); color: #fff; }
        .btn-join { background: #25d366; color: #fff; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <div class="logo">DVARY_SNIPER_V54</div>
        <div>
            <button id="btn-sw" class="lang-btn active" onclick="changeLang('sw')">SW</button>
            <button id="btn-en" class="lang-btn" onclick="changeLang('en')">EN</button>
        </div>
    </div>

    <div class="container">
        <div class="dash-circle" id="mainDash">
            <span id="txt-level" style="font-size: 10px; color: #888;">LEVEL YA BETRI</span>
            <span class="percent-val" id="batPer">0%</span>
            <span id="batTemp" style="color:#ffcc00; font-size:14px;"><i class="fas fa-thermometer-half"></i> 32°C</span>
        </div>

        <div class="ai-box">
            <i class="fas fa-robot" style="font-size: 30px; color: var(--p);"></i>
            <div>
                <strong id="txt-ai-title">USHAURI WA AI:</strong><br>
                <span id="txt-ai-msg">Mfumo unachambua simu yako...</span>
            </div>
        </div>

        <div class="grid-info">
            <div class="opt-card">
                <i class="fas fa-plug"></i>
                <span class="opt-title" id="txt-status">HALI:</span>
                <span class="opt-val" id="val-status">...</span>
            </div>
            <div class="opt-card">
                <i class="fas fa-microchip"></i>
                <span id="txt-ram" class="opt-title">MATUMIZI YA RAM:</span>
                <span class="opt-val">48% (OPTIMAL)</span>
            </div>
            <div class="opt-card">
                <i class="fas fa-shield-alt"></i>
                <span id="txt-sec" class="opt-title">USALAMA:</span>
                <span class="opt-val" style="color: #00ff00;">ENCRYPTED</span>
            </div>
            <div class="opt-card">
                <i class="fas fa-heartbeat"></i>
                <span id="txt-health" class="opt-title">AFYA:</span>
                <span class="opt-val">98% (GOOD)</span>
            </div>
        </div>

        <button class="btn-full btn-alarm" onclick="playAlarm()">
            <i class="fas fa-bell"></i> <span id="txt-btn-alarm">JARIBU KING'ORA</span>
        </button>

        <a href="https://whatsapp.com/channel/0029VbCRC9b5fM5cruU8PF2M" class="btn-full btn-join">
            <i class="fab fa-whatsapp"></i> <span id="txt-btn-join">JIUNGE NA CHANNEL YETU</span>
        </a>
    </div>

    <audio id="alarmSound">
        <source src="https://cdn.pixabay.com/audio/2022/03/24/audio_349692c81a.mp3" type="audio/mpeg">
    </audio>

    <script>
        const content = {
            sw: {
                level: "LEVEL YA BETRI",
                aiTitle: "USHAURI WA AI:",
                aiNormal: "Simu yako ipo katika hali nzuri.",
                aiLow: "Chaji imepungua! Zima GPS na Bluetooth sasa.",
                aiCharge: "Inachaji vizuri. Epuka kutumia simu sasa hivi.",
                status: "HALI:",
                ram: "MATUMIZI YA RAM:",
                sec: "USALAMA:",
                health: "AFYA:",
                btnAlarm: "JARIBU KING'ORA",
                btnJoin: "JIUNGE NA CHANNEL YETU",
                charging: "INACHAJI...",
                discharging: "HAICHAJI"
            },
            en: {
                level: "BATTERY LEVEL",
                aiTitle: "AI ADVISOR:",
                aiNormal: "Your phone is in optimal condition.",
                aiLow: "Low Battery! Turn off GPS and Bluetooth now.",
                aiCharge: "Charging well. Avoid using the phone now.",
                status: "STATUS:",
                ram: "RAM USAGE:",
                sec: "SECURITY:",
                health: "HEALTH:",
                btnAlarm: "TEST ALARM",
                btnJoin: "JOIN OUR CHANNEL",
                charging: "CHARGING...",
                discharging: "DISCHARGING"
            }
        };

        let currentLang = 'sw';

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('btn-sw').classList.toggle('active', lang === 'sw');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            // Update UI Texts
            document.getElementById('txt-level').innerText = content[lang].level;
            document.getElementById('txt-ai-title').innerText = content[lang].aiTitle;
            document.getElementById('txt-status').innerText = content[lang].status;
            document.getElementById('txt-ram').innerText = content[lang].ram;
            document.getElementById('txt-sec').innerText = content[lang].sec;
            document.getElementById('txt-health').innerText = content[lang].health;
            document.getElementById('txt-btn-alarm').innerText = content[lang].btnAlarm;
            document.getElementById('txt-btn-join').innerText = content[lang].btnJoin;
            
            updateBatteryData();
        }

        function updateBatteryData() {
            if ('getBattery' in navigator) {
                navigator.getBattery().then(function(battery) {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('batPer').innerText = level + "%";
                    
                    const isCharging = battery.charging;
                    document.getElementById('val-status').innerText = isCharging ? content[currentLang].charging : content[currentLang].discharging;

                    const aiMsg = document.getElementById('txt-ai-msg');
                    if (isCharging) aiMsg.innerText = content[currentLang].aiCharge;
                    else if (battery.level < 0.2) aiMsg.innerText = content[currentLang].aiLow;
                    else aiMsg.innerText = content[currentLang].aiNormal;
                });
            }
        }

        function playAlarm() {
            const sound = document.getElementById('alarmSound');
            sound.play();
            document.getElementById('mainDash').style.borderColor = "red";
            setTimeout(() => {
                sound.pause();
                document.getElementById('mainDash').style.borderColor = "#1a1a1a";
                document.getElementById('mainDash').style.borderTopColor = "#00ffcc";
            }, 5000);
        }

        setInterval(updateBatteryData, 3000);
        updateBatteryData();
    </script>
</body>
</html>
